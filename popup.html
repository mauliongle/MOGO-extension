<!doctype html>
<html>
<head>
  <meta charset="utf-8">

  <style>
    body {
      margin: 0;
      font-family: 'Nunito', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-width: 392px;
      background: white;
    }
    .header {
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-text-mo { color: #111827; font-size: 24px; font-weight: 700; }
    .logo-text-go { color: #E84C4B; font-size: 24px; font-weight: 700; }
    
    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .title {
      color: #111827;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }
    .subtitle {
      color: #111827;
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
    }
    .badge {
      margin-top: 12px;
      padding: 8px 16px;
      background: rgba(232, 76, 75, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #E84C4B;
      font-size: 13px;
      font-weight: 600;
    }
    #dynamic-content {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo-text-mo">MO</span><span class="logo-text-go">GO</span>
    <img style="padding-left: 5px;" src="images/logo.svg" height="24px" />
  </div>
  
  <div id="dynamic-content">
    <!-- Default state renders instantly -->
    <div class="content" id="ready-view">
      <div class="title">MOGO extension is active</div>
      <div class="subtitle">Visit a <b>LinkedIn</b>, <b>Sales Navigator</b>, or <b>Apollo.io</b> search page to extract contacts.</div>
      <div class="badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E84C4B" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        No login required — unlimited access
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
