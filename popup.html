<!doctype html>
<html>

<head>
  <script src="popup.js" type="module"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter|Nunito">
  <style>
    body {
      margin: 0;
      font-family: 'Nunito', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-width: 392px;
      background: white;
    }
    .header {
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-text-mo { color: #111827; font-size: 24px; font-family: Nunito; font-weight: 700; }
    .logo-text-go { color: #E84C4B; font-size: 24px; font-family: Nunito; font-weight: 700; }

    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .title {
      color: #111827;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }
    .subtitle {
      color: #111827;
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
    }
    .badge {
      margin-top: 12px;
      padding: 8px 16px;
      background: rgba(232, 76, 75, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #E84C4B;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>

<body style="margin: 0px;">
  <div style="width: 344px; padding: 16px; justify-content: center; align-items: flex-start; gap: 8px; display: inline-flex">
    <div style="width: 137px; justify-content: center; align-items: center; display: flex">
      <span class="logo-text-mo">MO</span><span class="logo-text-go">GO</span>
      <img style="padding-left: 5px;" src="images/logo.png" height="24px">
    </div>
  </div>
</body>

</html>
