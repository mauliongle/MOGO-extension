<!doctype html>
<html>

<head>
  <script src="popup.js" type="module"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Nunito', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-width: 344px;
      background: white;
    }
    #mogo-header {
      width: 344px;
      padding: 16px;
      box-sizing: border-box;
      justify-content: center;
      align-items: center;
      display: flex;
    }
    .logo-text-mo { color: #111827; font-size: 24px; font-family: Nunito; font-weight: 700; }
    .logo-text-go { color: #E84C4B; font-size: 24px; font-family: Nunito; font-weight: 700; }
    .logo-img { padding-left: 5px; height: 24px; }
    #dynamic-content { width: 344px; }

    /* Component styles */
    .content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .title {
      color: #111827;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }
    .subtitle {
      color: #111827;
      font-size: 14px;
      text-align: center;
      line-height: 1.4;
    }
    .badge {
      margin-top: 12px;
      padding: 8px 16px;
      background: rgba(232, 76, 75, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #E84C4B;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>

<body style="margin: 0px;">
  <!-- Persistent header — never replaced by JS -->
  <div id="mogo-header">
    <span class="logo-text-mo">MO</span><span class="logo-text-go">GO</span>
    <img class="logo-img" src="icons/icon48.png" onerror="this.style.display='none'">
  </div>

  <!-- Dynamic content area — replaced by popup.js -->
  <div id="dynamic-content"></div>
</body>

</html>
