<div class="findy--component-laptop">
    <img width="100%" height="100%" class="findy--laptop-image" src="" alt="" />
    <span class="findy--component-laptop-loader" style="display: none;">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" />
        </svg>
    </span>
    <style>
        .findy--component-laptop {
            box-sizing: border-box;
            margin: 0;
            min-width: 0;
            display: inline-block;
            position: relative;
            vertical-align: top;
            width: 140px;
            height: 140px;
        }

        .findy--component-laptop-svg {
            position: absolute;
            width: 35%;
            height: 59%;
            top: 50%;
            left: 50%;
            transform: translate(-65%, -93%);
        }

        .findy--component-laptop .findy--laptop-image {
            width: 100%;
            height: 100%;
        }

        .findy--img-laptop-success,
        .findy--img-laptop-svg {
            width: 100%;
        }

        .findy--component-laptop-loader svg {
            animation: 2s linear infinite svg-animation;
            max-width: 24px;
        }

        @keyframes svg-animation {
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg)
            }
        }

        .findy--component-laptop-loader circle {
            animation: 1.4s ease-in-out infinite both circle-animation;
            display: block;
            fill: transparent;
            stroke: #e84c4b;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 280;
            stroke-width: 10px;
            transform-origin: 50% 50%;
        }

        @keyframes circle-animation {

            0%,
            25% {
                stroke-dashoffset: 280;
                transform: rotate(0);
            }

            50%,
            75% {
                stroke-dashoffset: 75;
                transform: rotate(45deg);
            }

            100% {
                stroke-dashoffset: 280;
                transform: rotate(360deg);
            }
        }
    </style>
</div>
