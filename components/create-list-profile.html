<div style="width: 424px; background: white; border-radius: 8px; flex-direction: column; justify-content: flex-start; align-items: center; display: inline-flex">
  <div style="align-self: stretch; padding: 24px; flex-direction: column; justify-content: flex-start; align-items: flex-start; gap: 16px; display: flex">
    <div style="color: #111827; font-size: 20px; font-family: Inter; font-weight: 600; line-height: 32px;">Create a new list</div>
    <div style="align-self: stretch; flex-direction: column; gap: 8px; display: flex">
      <label style="color: #111827; font-size: 14px; font-family: Inter; font-weight: 500;">List name</label>
      <input id="listnameInput" type="text" placeholder="Enter list name..."
        style="width: 100%; box-sizing: border-box; height: 40px; padding: 8px 12px; border: 1px solid #E0E0E0; border-radius: 4px; font-size: 14px; font-family: Inter; outline: none;"
      />
    </div>
    <div style="align-self: stretch; justify-content: flex-end; gap: 12px; display: flex">
      <div id="cancelBtn" 
        style="cursor: pointer; padding: 10px 16px; background: white; border: 1px solid #E0E0E0; border-radius: 8px; color: #111827; font-size: 14px; font-family: Inter; font-weight: 600; text-align: center;">
        Cancel
      </div>
      <div id="createListConfirmBtn" 
        style="cursor: pointer; padding: 10px 16px; background: #E84C4B; border-radius: 8px; color: white; font-size: 14px; font-family: Inter; font-weight: 600; text-align: center;">
        Create
      </div>
    </div>
  </div>
</div>
